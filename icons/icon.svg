<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TV Box Frame -->
  <rect x="10" y="20" width="108" height="88" rx="12" fill="#212121"/>
  
  <!-- Screen Area -->
  <rect x="18" y="28" width="92" height="72" rx="6" fill="#FF0000"/>
  
  <!-- Ship's Wheel (Skipper) -->
  <circle cx="64" cy="64" r="18" stroke="white" stroke-width="4"/>
  <circle cx="64" cy="64" r="6" fill="white"/>
  
  <!-- Spokes -->
  <line x1="64" y1="40" x2="64" y2="30" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="88" x2="64" y2="98" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="64" x2="30" y2="64" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="64" x2="98" y2="64" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Diagonal Spokes -->
  <line x1="47" y1="47" x2="40" y2="40" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="81" y1="81" x2="88" y2="88" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="81" y1="47" x2="88" y2="40" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="47" y1="81" x2="40" y2="88" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Antennas (TV vibe) -->
  <line x1="44" y1="20" x2="34" y2="10" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
  <line x1="84" y1="20" x2="94" y2="10" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
</svg>
